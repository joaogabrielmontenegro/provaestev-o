
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Task Management System</h1>
        </header>
        <main>
            <div class="task-form-container">
                <form id="add-task-form">
                    <input type="text" id="task-title" placeholder="Task title" required>
                    <textarea id="task-description" placeholder="Task description"></textarea>
                    <button type="submit">Add Task</button>
                </form>
            </div>
            <div class="kanban-board">
                <div class="column" id="todo-column" data-status="todo">
                    <h2>To Do</h2>
                    <div class="tasks"></div>
                </div>
                <div class="column" id="inprogress-column" data-status="inprogress">
                    <h2>In Progress</h2>
                    <div class="tasks"></div>
                </div>
                <div class="column" id="done-column" data-status="done">
                    <h2>Done</h2>
                    <div class="tasks"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
